<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 440" role="img" aria-labelledby="title desc" fill="none">
  <title id="title">MaxasOP orbital field</title>
  <desc id="desc">An animated contour-lens banner with orbiting nodes, scanlines, and a prismatic signal panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="50%" stop-color="#07172a" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity=".55" />
      <stop offset="42%" stop-color="#38bdf8" stop-opacity=".18" />
      <stop offset="70%" stop-color="#0ea5e9" stop-opacity=".05" />
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0" />
      <stop offset="45%" stop-color="#5eead4" stop-opacity=".32" />
      <stop offset="55%" stop-color="#f59e0b" stop-opacity=".32" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity=".88" />
      <stop offset="100%" stop-color="#111827" stop-opacity=".38" />
    </linearGradient>

    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <pattern id="dotfield" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="7" r="1.4" fill="#27415d" opacity=".50" />
      <circle cx="25" cy="18" r="0.9" fill="#1d4ed8" opacity=".28" />
      <circle cx="40" cy="8" r="1.1" fill="#5eead4" opacity=".16" />
      <circle cx="18" cy="35" r="0.9" fill="#f59e0b" opacity=".14" />
    </pattern>

    <pattern id="scanlines" width="1" height="18" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#ffffff" opacity=".03" />
    </pattern>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" />
    </filter>

    <filter id="microGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
  </defs>

  <rect width="1600" height="440" fill="url(#bg)" />
  <rect width="1600" height="440" fill="url(#dotfield)" opacity=".7" />
  <rect width="1600" height="440" fill="url(#scanlines)" opacity=".55" />

  <g opacity=".8">
    <path d="M-120 360 C 180 240 340 140 560 120 C 760 102 980 176 1240 122 C 1410 86 1555 48 1720 84" fill="none" stroke="#1d4ed8" stroke-opacity=".22" stroke-width="1.5" stroke-dasharray="2 18" />
    <path d="M-120 74 C 150 118 350 210 540 220 C 760 234 1015 118 1260 154 C 1435 180 1560 250 1710 198" fill="none" stroke="#5eead4" stroke-opacity=".14" stroke-width="1.4" stroke-dasharray="1 14" />
  </g>

  <rect x="-220" y="0" width="260" height="440" fill="url(#beam)" opacity=".35">
    <animateTransform attributeName="transform" type="translate" values="-260 0; 1900 0" dur="16s" repeatCount="indefinite" />
  </rect>

  <ellipse cx="760" cy="224" rx="420" ry="180" fill="url(#halo)" opacity=".56" filter="url(#softGlow)" />

  <g transform="translate(760 220)">
    <circle r="32" fill="#0ea5e9" opacity=".16" filter="url(#softGlow)" />
    <circle r="12" fill="#e2e8f0" opacity=".92" />
    <circle r="6" fill="#0b1020" />
    <path d="M0 -132 L22 -18 L132 0 L22 18 L0 132 L-22 18 L-132 0 L-22 -18 Z" fill="none" stroke="url(#signal)" stroke-width="1.8" stroke-opacity=".65" />
    <path d="M0 -96 L52 -52 L96 0 L52 52 L0 96 L-52 52 L-96 0 L-52 -52 Z" fill="url(#glass)" stroke="#e2e8f0" stroke-opacity=".16" stroke-width="1.2" />
    <path d="M-120 0 H120" stroke="#5eead4" stroke-opacity=".35" stroke-width="1.2" stroke-dasharray="8 14">
      <animate attributeName="stroke-dashoffset" values="0;42" dur="7s" repeatCount="indefinite" />
    </path>
    <path d="M0 -120 V120" stroke="#38bdf8" stroke-opacity=".2" stroke-width="1.2" stroke-dasharray="4 12">
      <animate attributeName="stroke-dashoffset" values="0;32" dur="9s" repeatCount="indefinite" />
    </path>

    <g>
      <ellipse rx="236" ry="118" fill="none" stroke="#38bdf8" stroke-opacity=".35" stroke-width="1.2" stroke-dasharray="8 18">
        <animate attributeName="stroke-dashoffset" values="0;220" dur="20s" repeatCount="indefinite" />
      </ellipse>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="54s" repeatCount="indefinite" />
    </g>

    <g>
      <ellipse rx="188" ry="92" fill="none" stroke="#5eead4" stroke-opacity=".45" stroke-width="1.4" stroke-dasharray="2 14">
        <animate attributeName="stroke-dashoffset" values="0;-180" dur="13s" repeatCount="indefinite" />
      </ellipse>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="34s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(32)">
      <ellipse rx="274" ry="150" fill="none" stroke="#f59e0b" stroke-opacity=".24" stroke-width="1.1" stroke-dasharray="1 10">
        <animate attributeName="stroke-dashoffset" values="0;170" dur="11s" repeatCount="indefinite" />
      </ellipse>
      <animateTransform attributeName="transform" type="rotate" from="32" to="392" dur="42s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(-18)">
      <circle cx="0" cy="-168" r="6" fill="#5eead4">
        <animate attributeName="r" values="4.5;7;4.5" dur="4.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="0" cy="-168" r="16" fill="none" stroke="#5eead4" stroke-opacity=".22" stroke-width="1.5">
        <animate attributeName="r" values="14;19;14" dur="5.5s" repeatCount="indefinite" />
      </circle>
      <animateTransform attributeName="transform" type="rotate" from="-18" to="342" dur="18s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(94)">
      <circle cx="0" cy="-154" r="5" fill="#38bdf8" />
      <circle cx="0" cy="-154" r="14" fill="none" stroke="#38bdf8" stroke-opacity=".18" stroke-width="1.5" />
      <animateTransform attributeName="transform" type="rotate" from="94" to="454" dur="22s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(142)">
      <circle cx="0" cy="-176" r="4.5" fill="#f59e0b" />
      <circle cx="0" cy="-176" r="12" fill="none" stroke="#f59e0b" stroke-opacity=".2" stroke-width="1.2" />
      <animateTransform attributeName="transform" type="rotate" from="142" to="502" dur="27s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(236)">
      <circle cx="0" cy="-166" r="4.5" fill="#e2e8f0" />
      <circle cx="0" cy="-166" r="10" fill="none" stroke="#e2e8f0" stroke-opacity=".15" stroke-width="1" />
      <animateTransform attributeName="transform" type="rotate" from="236" to="596" dur="31s" repeatCount="indefinite" />
    </g>

    <g opacity=".68" filter="url(#microGlow)">
      <circle cx="-204" cy="-28" r="2.2" fill="#5eead4" />
      <circle cx="-178" cy="-98" r="1.8" fill="#38bdf8" />
      <circle cx="-130" cy="68" r="1.9" fill="#f59e0b" />
      <circle cx="154" cy="-84" r="2.1" fill="#38bdf8" />
      <circle cx="188" cy="42" r="1.7" fill="#5eead4" />
      <circle cx="214" cy="108" r="2.3" fill="#e2e8f0" />
    </g>
  </g>

  <rect x="1010" y="76" width="510" height="288" rx="28" fill="#08101d" fill-opacity=".58" stroke="#2a4a68" stroke-opacity=".42" />
  <rect x="1010" y="76" width="510" height="288" rx="28" fill="url(#scanlines)" opacity=".16" />

  <text x="1050" y="152" fill="#e2e8f0" font-size="60" font-family="Verdana, Arial, sans-serif" font-weight="700">MaxasOP</text>


</svg>
